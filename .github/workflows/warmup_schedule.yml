name: Zeta Warmup Scheduler

on:
  schedule:
    # Run at 09:00 and 18:00 UTC every day
    - cron: '0 9,18 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Run warmup
        env:
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_PROXY_SERVER: ${{ secrets.REDDIT_PROXY_SERVER }}
          REDDIT_PROXY_USERNAME: ${{ secrets.REDDIT_PROXY_USERNAME }}
          REDDIT_PROXY_PASSWORD: ${{ secrets.REDDIT_PROXY_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python warmup.py --live

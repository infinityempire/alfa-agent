name: Zeta Warmup Scheduler

on:
  schedule:
    # Run at 09:00 and 18:00 UTC every day
    - cron: '0 9,18 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Tor
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor
          # Enable ControlPort for circuit rotation
          echo "ControlPort 9051" | sudo tee -a /etc/tor/torrc
          echo "CookieAuthentication 0" | sudo tee -a /etc/tor/torrc
          sudo service tor start
          # Wait for Tor to fully connect (up to 60 seconds)
          echo "Waiting for Tor to connect..."
          for i in $(seq 1 12); do
            if curl --socks5 socks5h://127.0.0.1:9050 --silent --max-time 10 https://check.torproject.org/api/ip | grep -q '"IsTor":true'; then
              echo "✅ Tor is connected and working!"
              break
            fi
            echo "Attempt $i/12 - Tor not ready yet, waiting 5s..."
            sleep 5
          done
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Run warmup via Tor
        env:
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USE_TOR: "true"
          TOR_PROXY: "socks5://127.0.0.1:9050"
          # Keep proxy secrets for fallback if needed
          REDDIT_PROXY_SERVER: ${{ secrets.REDDIT_PROXY_SERVER }}
          REDDIT_PROXY_USERNAME: ${{ secrets.REDDIT_PROXY_USERNAME }}
          REDDIT_PROXY_PASSWORD: ${{ secrets.REDDIT_PROXY_PASSWORD }}
        run: python warmup.py

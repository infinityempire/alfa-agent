services:
  - type: cron
    name: alfa-agent-warmup
    runtime: docker
    schedule: "0 9,18 * * *"
    dockerfilePath: ./Dockerfile
    envVars:
      - key: REDDIT_USERNAME
        sync: false
      - key: REDDIT_PASSWORD
        sync: false
      - key: REDDIT_PROXY_SERVER
        sync: false
      - key: REDDIT_PROXY_USERNAME
        sync: false
      - key: REDDIT_PROXY_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: COMMENTS_PER_RUN
        value: "3"
